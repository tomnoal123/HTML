<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --primary-color: #fff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing:border-box
        }
        body {
            background-image: url(logowanie-tapeta.jpg);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            color: var(--primary-color);
        }
        .box {
            width: 456px;
            height: 600px;
            border: 3px solid var(--primary-color);
            border-radius: 25px;
            backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            justify-content: center; 
            padding: 2rem 3rem;
            gap: 2rem;
        }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .title-login{
            text-align: center;
            margin-bottom: 30px;
              
        }
        .checkbox {
            display: flex;
            gap: 10px;
            
            
        }
        .checkbox input{
             cursor: pointer;
        }
        .checkboxforgotpassoword{
            display: flex;
            justify-content: space-between;
            
        }
        .forgotpassowrd{
            font-weight: bold;
            cursor: pointer;
        }
        .Log-in{
            width: 100%;
            height: 50px;
            border: none;
            cursor: pointer;
            font-size: 20px;
            background-color: var(--primary-color);
            font-weight: bold;
            border-radius: 15px;
            font-family: Poppins, sans-serif;
            transition: transform 300ms;
        }
        .Log-in:hover{
            transform: scale(1.05);
            background-color: rgb(135, 34, 155);
            color:  rgb(30, 169, 224) ;
            text-shadow: 0px 0px 6px rgba(30, 169, 224, 0.6);
        }
        .register {
        font-size: 0.9rem;
        color: var(--primary-color);
        text-align: center;
        margin-top: 30px;
        }
        .register p a {
        text-decoration: none;
        color: var(--primary-color);
        font-weight: 600;
        }

        .register p a:hover {
        text-decoration: underline;
    }
        
        .input-box {
        position: relative;
        margin: 30px 0;
        max-width: 100%;
        border-bottom: 2px solid var(--primary-color);
        font-family: 'Poppins', sans-serif;
        font-size: 1.5rem;
        margin: 0;
        }
        .checkboxforgotpassoword p a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;

        }
        .checkboxforgotpassoword p a:hover{
            text-decoration: underline;
        }
        .input-box input{
            background-color: transparent;
            border: none;
            outline: none;
            padding: 0 35px 0 5px;
            font-size: 1rem;
            color: var(--primary-color);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            height: 45px;
            width: 100%;
        }
                .input-box label {
                position: absolute;
                top: 50%;
                left: 5px;
                transform: translateY(-50%);
                color:var(--primary-color);
                font-size: 1rem;
                transition: all 0.5s;
                pointer-events: none;
                }
                .input-box input:focus + label,
                .input-box input:valid + label {
                top: -5px;
                 font-size: 1rem;
                }
                
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie</title>
</head>
<body>
    
        <section class="box">
            <form>
                <h1 class="title-login">Login</h1>
                            <!--LOGOWANIE UŻYTKOWNIKA-->
                            <div class="input-box">
                                <input  id="input-username"   type="text" required>
                                <label>Username</label>
                            </div>

                            <div class="input-box">
                                <input id="input-password"  type="password" required>
                                <label>Password</label>
                            </div>
                            <div class="checkboxforgotpassoword">
                                <div class="checkbox">
                                    <input type="checkbox">
                                    <p>Remember Me</p>
                                </div>
                                
                                <p><a href="#">Forget Password</a></p>

                            </div>

                            <button class="Log-in">Log in</button>
                            <div class="register">
                            <p>Don't have an account? <a href="#">Register</a></p>
                            </div>
            </form>
        </section>
</body>
</html>
