<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="signin-form.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>

<body>
    <div class="container">

        <section id="return-box">
            <div class="return-box">
               
                <a class="back" href="main-login.html"><-- back</a>   

                <h1 class="welcome-page">Welcome Page</h1><br>
                <p>Do you have an account?</p>

                <a href="main-login.html">
                    <button class="return-button">Log in</button>
                </a>

            </div>
        </section>

        <section id="box">
            <form>

                <div id="Register-box">

                    <h1 class="create-account-header">Create a account</h1>

                    <div class="username-box">
                        <input id="username-input" type="text" required>
                        <label for="username-input">Username</label>
                    </div>

                    <div class="password-box">
                        <input id="password-input" type="password" required>
                        <label for="password-input">Password</label>
                    </div>

                    <div class="password-box">
                        <input id="repeat-password-input" type="password" required>
                        <label for="repeat-password-input">Confirm password</label>
                    </div>

                </div>

                <div class="checkbox-box">
                    <input type="checkbox">
                    <p>I accept a terms of the agreement</p>     
                </div>

                <div class="Signup-box">
                    <button class="sign-button">SIGN UP</button>
                </div>

            </form>
        </section>

    </div>
</body>
</html>
